<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

/* 🌟 LIGHT BACKGROUND (SINGLE CLEAN COLOR) */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:#eaf2ff;
}

/* CARD */
.card{
    width:420px;
    background:#ffffff;
    padding:40px 30px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.12);
}

/* TITLE */
h1{
    color:#1f1f1f;
    margin-bottom:25px;
    font-size:28px;
    font-weight:700;
}

/* LABEL */
.label{
    text-align:left;
    font-size:14px;
    font-weight:600;
    margin-top:12px;
    color:#333;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:12px;
    border:1px solid #d0d7e2;
    border-radius:10px;
    outline:none;
    transition:0.3s;
    background:#f9fbff;
}

input:focus{
    border-color:#4facfe;
    box-shadow:0 0 8px rgba(79,172,254,0.25);
}

/* 🌟 BUTTON */
.btn{
    width:100%;
    padding:13px;
    margin-top:15px;
    border:none;
    border-radius:10px;

    background: linear-gradient(135deg,#4facfe,#2f80ed);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:600;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(47,128,237,0.25);
}

/* LINK */
p{
    margin-top:18px;
    font-size:14px;
    color:#444;
}

a{
    color:#2f80ed;
    font-weight:bold;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="card">

    <h1>Create Account</h1>

    <form action="register" method="post">

        <div class="label">Name</div>
        <input type="text" name="name" required>

        <div class="label">Email</div>
        <input type="email" name="email" required>

        <div class="label">Password</div>
        <input type="password" name="password" required>

        <button type="submit" class="btn">Register</button>

    </form>

    <p>
        Already registered?
        <a href="login.jsp">Login here</a>
    </p>

</div>

</body>
</html>
